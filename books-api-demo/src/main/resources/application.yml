spring:
  application:
    name: books-api-demo
  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
springdoc:
  default-support-form-data: true
  paths-to-match: /api/**
log:
  forging:
    replacement: "[LOG FORGED]"
  p11:
    masking:
      enabled: true
      mask-style: PARTIAL
      mask-character: "*"
      fields:
        - email
        - phoneNumber
      # language=RegExp
      patterns:
        - '(?:[a-z]+_)*token(?:_[a-z]+)*\s*=([^"]+)[])]'
        - '"(?:[a-z]+_)*token(?:_[a-z]+)*"\s*:\s*"([^"]+)"'