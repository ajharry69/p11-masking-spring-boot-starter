spring:
  application:
    name: books-api-demo
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    #show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
springdoc:
  default-support-form-data: true
  paths-to-match: /api/**
log:
  forging:
    replacement: "[LOG FORGED]"
  p11:
    masking:
      enabled: true
      mask-style: PARTIAL
      mask-character: "*"
      fields:
        - email
        - phoneNumber
      # language=RegExp
      patterns:
        - '(?:[a-z]+_)*token(?:_[a-z]+)*\s*=([^"]+)[])]'
        - '"(?:[a-z]+_)*token(?:_[a-z]+)*"\s*:\s*"([^"]+)"'