spring:
  application:
    name: demo
  datasource:
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    #show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
log:
  forging:
    replacement: "[LOG FORGED]"
  p11:
    masking:
      enabled: true
      mask-style: PARTIAL
      mask-character: "*"
      default-mask-length: 8
      partial-exemption:
        from-end: 0
        from-start: 1
        min-unmasked-length: 3
        mask-if-short: true
      fields:
        - email
        - phoneNumber
      # language=RegExp
      patterns:
        - '(?:[a-z]+_)*token(?:_[a-z]+)*\s*=([^"]+)[])]'
        - '"(?:[a-z]+_)*token(?:_[a-z]+)*"\s*:\s*"([^"]+)"'